<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOTOBUKI COFFEE NOTE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --warm-white: #FAF8F4;
  --dark: #1A1612;
  --brown: #3D2B1A;
  --roast: #7C4A1E;
  --gold: #C8952A;
  --muted: #8A7F74;
  --border: #DDD5C8;
  --card-bg: #FFFDF9;
  --tag-bg: #EDE6DA;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; font-weight: 300; }

/* ── LOADING ── */
#loading-screen {
  position: fixed; inset: 0; background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem; z-index: 9999;
  transition: opacity .4s;
}
#loading-screen.hide { opacity: 0; pointer-events: none; }
.loading-logo { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; letter-spacing: .18em; color: var(--brown); }
.loading-dots { display: flex; gap: 6px; }
.loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: dotpulse 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes dotpulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* ── ONBOARDING ── */
#screen-ob { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
#screen-ob::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 20% 50%, rgba(124,74,30,.08) 0%, transparent 70%), radial-gradient(ellipse 50% 60% at 80% 30%, rgba(200,149,42,.06) 0%, transparent 60%); }
.ob-inner { position: relative; text-align: center; padding: 2.5rem 2rem; max-width: 400px; width: 100%; }
.ob-wordmark { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px,8vw,52px); font-weight: 300; letter-spacing: .18em; color: var(--brown); line-height: 1; }
.ob-sub { font-size: 10px; letter-spacing: .35em; color: var(--muted); margin-top: 6px; text-transform: uppercase; }
.ob-rule { width: 40px; height: 1px; background: var(--gold); margin: 1.8rem auto; }
.ob-tagline { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--muted); margin-bottom: 2rem; line-height: 1.7; }
.ob-label { font-size: 11px; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; margin-bottom: .6rem; text-align: left; }
.ob-input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid var(--border); background: transparent; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; color: var(--dark); outline: none; transition: border-color .2s; }
.ob-input:focus { border-bottom-color: var(--roast); }
.ob-btn { margin-top: 1.8rem; width: 100%; padding: 13px; background: var(--brown); color: var(--cream); border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; letter-spacing: .12em; cursor: pointer; transition: background .2s; }
.ob-btn:hover { background: var(--roast); }
.ob-error { font-size: 12px; color: #B84040; margin-top: .75rem; min-height: 18px; }

/* ── HEADER ── */
.header { position: sticky; top: 0; z-index: 50; background: rgba(245,240,232,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.25rem; }
.header-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: .14em; color: var(--brown); }
.header-logo span { font-size: 10px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: .2em; color: var(--muted); display: block; margin-top: 1px; }
.header-user { display: flex; align-items: center; gap: 8px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--brown); color: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }

/* ── TABS ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--warm-white); padding: 0 1.25rem; }
.tab-btn { padding: 14px 0; margin-right: 2rem; font-size: 12px; letter-spacing: .1em; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color .15s, border-color .15s; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }
.tab-btn.active { color: var(--brown); border-bottom-color: var(--roast); font-weight: 500; }

/* ── MAIN ── */
.main { padding: 1.25rem; max-width: 660px; margin: 0 auto; }

/* ── CARDS ── */
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 2px; padding: 1.25rem; margin-bottom: .75rem; position: relative; transition: box-shadow .15s; animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } }
.card:hover { box-shadow: 0 2px 12px rgba(61,43,26,.06); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: .75rem; }
.card-bean-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--brown); line-height: 1.2; }
.badge-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: .75rem; }
.badge { font-size: 10px; letter-spacing: .06em; padding: 3px 9px; border-radius: 1px; font-weight: 400; }
.badge-origin { background: #EAF4EF; color: #2A6B50; border: 1px solid #B5D9C8; }
.badge-roast  { background: #FAF0E2; color: #8A4A12; border: 1px solid #E8C898; }
.badge-tool   { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
.flavor-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: .75rem; }
.flavor-tag { font-size: 10px; padding: 2px 8px; background: #EDE8FA; color: #4A3A8A; border: 1px solid #C5BAEE; border-radius: 10px; }
.recipe-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin: .75rem 0; }
.recipe-cell { background: var(--cream); border: 1px solid var(--border); border-radius: 2px; padding: .5rem; text-align: center; }
.recipe-val { font-size: 15px; font-weight: 500; color: var(--dark); }
.recipe-unit { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: .05em; }
.tasting { font-size: 13px; color: var(--muted); line-height: 1.75; padding-left: 10px; border-left: 2px solid var(--border); margin-top: .75rem; }
.stars-row { display: flex; gap: 2px; }
.star-glyph { font-size: 14px; }
.star-filled { color: var(--gold); }
.star-empty  { color: var(--border); }
.shared-badge { font-size: 10px; letter-spacing: .08em; color: var(--gold); border: 1px solid var(--gold); padding: 2px 7px; border-radius: 1px; }
.author-row { display: flex; align-items: center; gap: 8px; margin-bottom: .75rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border); }
.author-name { font-size: 13px; font-weight: 500; color: var(--dark); }
.author-date { font-size: 11px; color: var(--muted); }

/* ── EMPTY / STATUS ── */
.empty { padding: 4rem 1rem; text-align: center; }
.empty-icon { font-family: 'Cormorant Garamond', serif; font-size: 42px; color: var(--border); margin-bottom: 1rem; }
.empty-text { font-size: 14px; color: var(--muted); line-height: 1.8; }
.sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); padding: .5rem 0 1rem; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; }
.sync-dot.syncing { background: var(--gold); animation: dotpulse 1s infinite; }
.sync-dot.error { background: #B84040; }

/* ── FAB ── */
.fab { position: fixed; bottom: 1.75rem; right: 1.75rem; width: 50px; height: 50px; border-radius: 50%; background: var(--brown); color: var(--cream); font-size: 26px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 14px rgba(61,43,26,.25); transition: background .15s, transform .1s; z-index: 40; }
.fab:hover { background: var(--roast); transform: scale(1.04); }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,18,.5); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
@media (min-width: 520px) { .overlay { align-items: center; padding: 1rem; } .modal { border-radius: 2px; max-height: 90vh; } }
.modal { background: var(--warm-white); width: 100%; max-width: 520px; max-height: 94vh; overflow-y: auto; border-radius: 8px 8px 0 0; padding: 1.5rem 1.25rem 2rem; animation: slideUp .22s ease; }
@keyframes slideUp { from { transform:translateY(30px); opacity:0; } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--brown); }
.modal-close { width: 28px; height: 28px; background: none; border: 1px solid var(--border); border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: background .15s; }
.modal-close:hover { background: var(--tag-bg); }
.f-group { margin-bottom: 1.1rem; }
.f-label { display: block; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .45rem; }
.f-input { width: 100%; padding: 9px 10px; border: 1px solid var(--border); background: var(--cream); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 300; color: var(--dark); outline: none; border-radius: 1px; transition: border-color .15s; -webkit-appearance: none; }
.f-input:focus { border-color: var(--roast); }
textarea.f-input { resize: vertical; min-height: 80px; line-height: 1.7; }
select.f-input { cursor: pointer; }
.bean-preview { background: var(--cream); border: 1px solid var(--border); border-radius: 1px; padding: .85rem 1rem; margin-bottom: 1.1rem; display: none; }
.bean-preview-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--brown); margin-bottom: .4rem; }
.recipe-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .6rem; margin-bottom: .6rem; }
.recipe-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-bottom: .6rem; }
.recipe-field .f-input { text-align: center; }
.recipe-hint { font-size: 10px; color: var(--muted); text-align: center; margin-top: 3px; }
.section-label { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--roast); margin: 1.25rem 0 .75rem; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.star-selector { display: flex; gap: 6px; }
.star-sel { font-size: 24px; cursor: pointer; color: var(--border); transition: color .1s, transform .1s; user-select: none; line-height: 1; }
.star-sel.on { color: var(--gold); }
.star-sel:hover { transform: scale(1.15); }
.share-row { display: flex; align-items: center; gap: 10px; padding: .85rem 1rem; background: #FFF8EE; border: 1px solid #EDD9AA; border-radius: 1px; cursor: pointer; margin-top: 1rem; }
.share-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--roast); cursor: pointer; }
.share-label { font-size: 13px; color: var(--brown); flex: 1; }
.share-hint { font-size: 11px; color: var(--muted); }
.modal-actions { display: flex; gap: .75rem; margin-top: 1.5rem; }
.btn-cancel { flex: 1; padding: 11px; background: none; border: 1px solid var(--border); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; letter-spacing: .08em; color: var(--muted); cursor: pointer; transition: background .15s; }
.btn-cancel:hover { background: var(--tag-bg); }
.btn-save { flex: 2; padding: 11px; background: var(--brown); border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; letter-spacing: .12em; color: var(--cream); cursor: pointer; transition: background .15s; position: relative; }
.btn-save:hover { background: var(--roast); }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }
.screen { display: none; }
.screen.active { display: block; }
#panel-community { display: none; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-logo">KOTOBUKI</div>
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<!-- Onboarding -->
<div id="screen-ob" class="screen active">
  <div class="ob-inner">
    <div class="ob-wordmark">KOTOBUKI</div>
    <div class="ob-sub">Coffee Note</div>
    <div class="ob-rule"></div>
    <div class="ob-tagline">あなたのコーヒーの記録を、<br>ここに残していきましょう。</div>
    <div class="ob-label">ニックネーム</div>
    <input class="ob-input" id="name-input" type="text" placeholder="例：Taro" maxlength="20" autocomplete="off">
    <button class="ob-btn" id="start-btn" onclick="startApp()">はじめる</button>
    <div class="ob-error" id="ob-error"></div>
  </div>
</div>

<!-- Main -->
<div id="screen-main" class="screen">
  <div class="header">
    <div class="header-logo">KOTOBUKI <span>COFFEE NOTE</span></div>
    <div class="header-user">
      <div class="avatar" id="nav-avatar"></div>
      <div style="font-size:13px;color:var(--muted)" id="nav-name-disp"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-mine" onclick="switchTab('mine')">マイノート</button>
    <button class="tab-btn" id="tab-community" onclick="switchTab('community')">みんなのレシピ</button>
  </div>
  <div class="main">
    <div id="sync-status" class="sync-indicator">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <span id="sync-text">接続中...</span>
    </div>
    <div id="panel-mine"></div>
    <div id="panel-community"></div>
  </div>
  <button class="fab" id="fab-btn" onclick="openModal()">＋</button>
</div>

<!-- Modal -->
<div class="overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title">新しいノート</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="f-group">
      <label class="f-label">コーヒー豆</label>
      <select class="f-input" id="bean-select"><option value="">— 豆を選んでください —</option></select>
    </div>
    <div class="bean-preview" id="bean-preview">
      <div class="bean-preview-name" id="bp-name"></div>
      <div class="badge-row" id="bp-badges"></div>
      <div class="flavor-row" id="bp-flavors"></div>
    </div>
    <div class="section-label">ドリップレシピ</div>
    <div class="recipe-grid">
      <div class="recipe-field f-group" style="margin:0">
        <label class="f-label" style="text-align:center">豆の量</label>
        <input type="number" class="f-input" id="r-beans" placeholder="16">
        <div class="recipe-hint">g</div>
      </div>
      <div class="recipe-field f-group" style="margin:0">
        <label class="f-label" style="text-align:center">湯量</label>
        <input type="number" class="f-input" id="r-water" placeholder="240">
        <div class="recipe-hint">ml</div>
      </div>
      <div class="recipe-field f-group" style="margin:0">
        <label class="f-label" style="text-align:center">湯温</label>
        <input type="number" class="f-input" id="r-temp" placeholder="92">
        <div class="recipe-hint">℃</div>
      </div>
    </div>
    <div class="recipe-grid-2">
      <div class="f-group" style="margin:0">
        <label class="f-label">抽出時間</label>
        <input type="text" class="f-input" id="r-time" placeholder="3:00">
      </div>
      <div class="f-group" style="margin:0">
        <label class="f-label">抽出器具</label>
        <select class="f-input" id="r-brewer">
          <option>ハリオV60</option><option>カリタウェーブ</option><option>メリタ</option>
          <option>エアロプレス</option><option>フレンチプレス</option><option>ケメックス</option><option>その他</option>
        </select>
      </div>
    </div>
    <div class="section-label">テイスティング</div>
    <div class="f-group">
      <label class="f-label">評価</label>
      <div class="star-selector" id="star-selector">
        <span class="star-sel" data-v="1" onclick="setStar(1)">★</span>
        <span class="star-sel" data-v="2" onclick="setStar(2)">★</span>
        <span class="star-sel" data-v="3" onclick="setStar(3)">★</span>
        <span class="star-sel" data-v="4" onclick="setStar(4)">★</span>
        <span class="star-sel" data-v="5" onclick="setStar(5)">★</span>
      </div>
    </div>
    <div class="f-group">
      <label class="f-label">テイスティングメモ</label>
      <textarea class="f-input" id="r-memo" placeholder="フレーバー、香り、口当たり、後味など自由に..."></textarea>
    </div>
    <label class="share-row">
      <input type="checkbox" id="share-check">
      <div>
        <div class="share-label">みんなのレシピにシェアする</div>
        <div class="share-hint">他のユーザーがこのレシピを閲覧できます</div>
      </div>
    </label>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="save-btn" onclick="saveNote()">保存する</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase init ──────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA1Tc_SecQx_EyTM1VJucUmfYy6o7nINKc",
  authDomain: "kotobuki-coffee-note.firebaseapp.com",
  projectId: "kotobuki-coffee-note",
  storageBucket: "kotobuki-coffee-note.firebasestorage.app",
  messagingSenderId: "393587229448",
  appId: "1:393587229448:web:f1148bebff9921896b62bd"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── State ──────────────────────────────────
let currentUser = '';
let currentStar = 0;
let allBeans    = [];
let myUnsubscribe        = null;
let communityUnsubscribe = null;

// ── Fallback beans ─────────────────────────
const FALLBACK_BEANS = [
  { id:'b1', name:'エチオピア イルガチェフェ',   origin:'エチオピア',  roast:'ライト',          process:'ウォッシュト', flavors:['ジャスミン','ベルガモット','ピーチ'] },
  { id:'b2', name:'グアテマラ アンティグア',      origin:'グアテマラ',  roast:'ミディアム',       process:'ウォッシュト', flavors:['チョコレート','キャラメル','オレンジ'] },
  { id:'b3', name:'コロンビア ウィラ',            origin:'コロンビア',  roast:'ミディアム',       process:'ウォッシュト', flavors:['アプリコット','パネラ','ナッツ'] },
  { id:'b4', name:'ケニア AA',                    origin:'ケニア',      roast:'ミディアムライト',  process:'ウォッシュト', flavors:['ブラックカラント','トマト','グレープフルーツ'] },
  { id:'b5', name:'ブラジル セラード',            origin:'ブラジル',    roast:'ミディアムダーク',  process:'ナチュラル',   flavors:['ヘーゼルナッツ','ミルクチョコ','バニラ'] },
  { id:'b6', name:'パナマ ゲイシャ',              origin:'パナマ',      roast:'ライト',           process:'ウォッシュト', flavors:['ジャスミン','桃','マスカット'] },
];

// ── Load beans ─────────────────────────────
async function loadBeans() {
  try {
    const res  = await fetch('https://kotobukiroasting-boop.github.io/kotobuki/kotobuki_flavor_guide.html');
    const html = await res.text();
    const m    = html.match(/(?:const|let|var)\s+(?:beans|coffeeData|products|BEANS|items)\s*=\s*(\[[\s\S]*?\]);/);
    if (m) {
      const raw    = JSON.parse(m[1]);
      const parsed = raw.map((b,i) => ({
        id: b.id||'b'+i, name: b.name||b.title||'', origin: b.origin||b.country||'',
        roast: b.roast||b.roastLevel||'', process: b.process||'', flavors: b.flavors||b.flavorNotes||[],
      })).filter(b => b.name);
      allBeans = parsed.length ? parsed : FALLBACK_BEANS;
    } else { allBeans = FALLBACK_BEANS; }
  } catch { allBeans = FALLBACK_BEANS; }
  populateBeanSelect();
}

function populateBeanSelect() {
  const sel = document.getElementById('bean-select');
  sel.innerHTML = '<option value="">— 豆を選んでください —</option>' +
    allBeans.map(b => `<option value="${b.id}">${b.name}${b.origin?' ('+b.origin+')':''}</option>`).join('');
  sel.onchange = () => showBeanPreview(sel.value);
}

function showBeanPreview(id) {
  const area = document.getElementById('bean-preview');
  if (!id) { area.style.display='none'; return; }
  const b = allBeans.find(x => x.id===id);
  if (!b) { area.style.display='none'; return; }
  document.getElementById('bp-name').textContent = b.name;
  document.getElementById('bp-badges').innerHTML =
    (b.origin  ? `<span class="badge badge-origin">${b.origin}</span>` : '') +
    (b.roast   ? `<span class="badge badge-roast">${b.roast}</span>`   : '') +
    (b.process ? `<span class="badge badge-tool">${b.process}</span>`  : '');
  document.getElementById('bp-flavors').innerHTML =
    (b.flavors||[]).map(f => `<span class="flavor-tag">${f}</span>`).join('');
  area.style.display = 'block';
}

// ── Stars ──────────────────────────────────
window.setStar = function(v) {
  currentStar = v;
  document.querySelectorAll('.star-sel').forEach(s => s.classList.toggle('on', parseInt(s.dataset.v)<=v));
};

// ── Save ───────────────────────────────────
window.saveNote = async function() {
  const beanId = document.getElementById('bean-select').value;
  const bean   = allBeans.find(b => b.id===beanId);
  if (!bean) { alert('豆を選んでください'); return; }

  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';

  const shared = document.getElementById('share-check').checked;
  const note = {
    user:        currentUser,
    date:        new Date().toLocaleDateString('ja-JP'),
    createdAt:   serverTimestamp(),
    beanId,
    beanName:    bean.name,
    beanOrigin:  bean.origin,
    beanRoast:   bean.roast,
    beanFlavors: bean.flavors||[],
    recipe: {
      beans:  document.getElementById('r-beans').value,
      water:  document.getElementById('r-water').value,
      temp:   document.getElementById('r-temp').value,
      time:   document.getElementById('r-time').value,
      brewer: document.getElementById('r-brewer').value,
    },
    stars:   currentStar,
    memo:    document.getElementById('r-memo').value,
    shared,
  };

  try {
    await addDoc(collection(db, 'notes'), note);
    closeModal();
  } catch(e) {
    alert('保存に失敗しました: ' + e.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '保存する';
  }
};

// ── Render card ────────────────────────────
function noteCard(data, isMine) {
  const r = data.recipe || {};
  const hasRecipe = r.beans || r.water || r.temp;
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const recipeHtml = hasRecipe ? `<div class="recipe-bar">
    ${r.beans ? `<div class="recipe-cell"><div class="recipe-val">${esc(r.beans)}</div><div class="recipe-unit">g · 豆</div></div>` : ''}
    ${r.water ? `<div class="recipe-cell"><div class="recipe-val">${esc(r.water)}</div><div class="recipe-unit">ml · 湯量</div></div>` : ''}
    ${r.temp  ? `<div class="recipe-cell"><div class="recipe-val">${esc(r.temp)}</div><div class="recipe-unit">℃ · 湯温</div></div>` : ''}
  </div>` : '';

  const authorHtml = !isMine ? `<div class="author-row">
    <div class="avatar" style="width:26px;height:26px;font-size:10px">${esc(data.user).slice(0,2)}</div>
    <div><div class="author-name">${esc(data.user)}</div><div class="author-date">${data.date}</div></div>
  </div>` : '';

  const footerHtml = isMine ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;padding-top:.6rem;border-top:1px solid var(--border)">
    <div style="font-size:11px;color:var(--muted)">${data.date}</div>
    ${data.shared ? '<span class="shared-badge">SHARED</span>' : ''}
  </div>` : '';

  return `<div class="card">
    ${authorHtml}
    <div class="card-top">
      <div>
        <div class="card-bean-name">${esc(data.beanName)}</div>
        <div class="badge-row" style="margin-top:6px;margin-bottom:0">
          ${data.beanOrigin ? `<span class="badge badge-origin">${esc(data.beanOrigin)}</span>` : ''}
          ${data.beanRoast  ? `<span class="badge badge-roast">${esc(data.beanRoast)}</span>`   : ''}
          ${r.brewer ? `<span class="badge badge-tool">${esc(r.brewer)}</span>` : ''}
          ${r.time   ? `<span class="badge badge-tool">${esc(r.time)}</span>`   : ''}
        </div>
      </div>
      <div class="stars-row" style="flex-shrink:0;padding-top:4px">
        ${Array.from({length:5},(_,i)=>`<span class="star-glyph ${i<(data.stars||0)?'star-filled':'star-empty'}">★</span>`).join('')}
      </div>
    </div>
    ${(data.beanFlavors||[]).length ? `<div class="flavor-row">${data.beanFlavors.map(f=>`<span class="flavor-tag">${esc(f)}</span>`).join('')}</div>` : ''}
    ${recipeHtml}
    ${data.memo ? `<div class="tasting">${esc(data.memo)}</div>` : ''}
    ${footerHtml}
  </div>`;
}

// ── Realtime listeners ─────────────────────
function subscribeMyNotes() {
  if (myUnsubscribe) myUnsubscribe();
  const q = query(
    collection(db, 'notes'),
    where('user', '==', currentUser),
    orderBy('createdAt', 'desc')
  );
  myUnsubscribe = onSnapshot(q, snap => {
    const el = document.getElementById('panel-mine');
    if (snap.empty) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">☕</div><div class="empty-text">まだノートがありません。<br>＋ボタンから最初の記録をつけましょう。</div></div>`;
    } else {
      el.innerHTML = snap.docs.map(d => noteCard(d.data(), true)).join('');
    }
    setSyncStatus(true);
  }, err => { console.error(err); setSyncStatus(false); });
}

function subscribeCommunity() {
  if (communityUnsubscribe) communityUnsubscribe();
  const q = query(
    collection(db, 'notes'),
    where('shared', '==', true),
    orderBy('createdAt', 'desc')
  );
  communityUnsubscribe = onSnapshot(q, snap => {
    const el = document.getElementById('panel-community');
    const others = snap.docs.filter(d => d.data().user !== currentUser);
    if (!others.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">☕</div><div class="empty-text">まだシェアされたレシピがありません。<br>ノートをシェアして最初の一人になりましょう。</div></div>`;
    } else {
      el.innerHTML = others.map(d => noteCard(d.data(), false)).join('');
    }
  });
}

function setSyncStatus(ok) {
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  dot.className  = 'sync-dot' + (ok ? '' : ' error');
  text.textContent = ok ? 'リアルタイム同期中' : '接続エラー';
}

// ── Modal ──────────────────────────────────
window.openModal = function() {
  currentStar = 0;
  document.querySelectorAll('.star-sel').forEach(s => s.classList.remove('on'));
  document.getElementById('bean-select').value = '';
  document.getElementById('bean-preview').style.display = 'none';
  ['r-beans','r-water','r-temp','r-time','r-memo'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('share-check').checked = false;
  document.getElementById('modal-overlay').classList.add('open');
};
window.closeModal = function() { document.getElementById('modal-overlay').classList.remove('open'); };
window.overlayClick = function(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); };

// ── Tabs ───────────────────────────────────
window.switchTab = function(tab) {
  ['mine','community'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('panel-'+t).style.display = t===tab ? 'block' : 'none';
  });
  document.getElementById('fab-btn').style.display = tab==='mine' ? 'flex' : 'none';
};

// ── Start ──────────────────────────────────
window.startApp = async function() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('ob-error').textContent = 'ニックネームを入力してください'; return; }
  document.getElementById('ob-error').textContent = '';

  const btn = document.getElementById('start-btn');
  btn.textContent = '接続中...'; btn.disabled = true;

  currentUser = name;
  localStorage.setItem('ktb_user', name);

  document.getElementById('nav-name-disp').textContent = name;
  document.getElementById('nav-avatar').textContent    = name.slice(0,2);
  document.getElementById('screen-ob').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');

  subscribeMyNotes();
  subscribeCommunity();

  btn.textContent = 'はじめる'; btn.disabled = false;
};

// ── Init ───────────────────────────────────
(async () => {
  const ls = document.getElementById('loading-screen');
  await loadBeans();
  const saved = localStorage.getItem('ktb_user');
  if (saved) document.getElementById('name-input').value = saved;
  document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') startApp(); });
  setTimeout(() => { ls.classList.add('hide'); setTimeout(()=>ls.remove(),400); }, 600);
})();
</script>
