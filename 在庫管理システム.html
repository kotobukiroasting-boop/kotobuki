<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーヒー豆 在庫管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#FBF6EF;--bg2:#F3EAE0;--brown-dark:#2E1505;--brown-mid:#6B3416;
    --brown-light:#C0732A;--accent:#E8956D;--cream:#FFFAF5;--border:#D4B896;
    --text:#3B1A08;--muted:#8B6A50;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  #loading-overlay{position:fixed;inset:0;background:#FBF6EF;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
  #loading-overlay .spin{font-size:48px;animation:spin 1.2s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading-overlay p{color:var(--muted);font-size:14px;}
  header{background:linear-gradient(100deg,#2E1505 0%,#6B3416 100%);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 24px rgba(40,10,0,.28);position:sticky;top:0;z-index:10;}
  .header-left{display:flex;align-items:center;gap:14px;}
  .header-logo{font-size:30px;}
  .header-title{color:#FFE0BA;font-family:'Noto Serif JP',serif;font-size:19px;font-weight:700;letter-spacing:.08em;}
  .header-sub{color:#C4946A;font-size:10px;letter-spacing:.18em;margin-top:2px;}
  .btn-add{background:linear-gradient(135deg,#E8956D,#C0732A);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:.06em;box-shadow:0 2px 12px rgba(200,80,0,.3);transition:transform .12s,box-shadow .12s;}
  .btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(200,80,0,.38);}
  .btn-add:active{transform:scale(.97);}
  .stats{display:flex;gap:12px;padding:20px 32px 0;}
  .stat-card{flex:1;background:var(--cream);border-radius:12px;padding:12px 16px;text-align:center;box-shadow:0 2px 8px rgba(100,40,0,.07);border:2px solid var(--border);}
  .stat-count{font-size:22px;font-weight:800;font-family:'Noto Serif JP',serif;}
  .stat-label{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:2px;}
  .stat-all .stat-count{color:#8B5E3C;}.stat-all{border-color:#D4956A;}
  .stat-light .stat-count{color:#E8956D;}.stat-light{border-color:#F2C49B;}
  .stat-mid .stat-count{color:#C0732A;}.stat-mid{border-color:#D4956A;}
  .stat-dark .stat-count{color:#6B3416;}.stat-dark{border-color:#8B5E3C;}
  .filters{display:flex;gap:10px;padding:16px 32px;flex-wrap:wrap;align-items:center;}
  .search-input{flex:1;min-width:180px;padding:9px 14px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);outline:none;transition:border-color .15s;}
  .search-input:focus{border-color:var(--accent);}
  select{padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);outline:none;cursor:pointer;}
  .chart-section{margin:16px 32px 0;background:var(--cream);border-radius:14px;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(100,40,0,.07);overflow:hidden;}
  .chart-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  .chart-header-left{display:flex;align-items:center;gap:8px;}
  .chart-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;color:var(--brown-dark);letter-spacing:.06em;}
  .chart-toggle{font-size:12px;color:var(--muted);}
  .chart-body{padding:16px 20px 18px;}
  .chart-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .chart-tab{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;}
  .chart-tab.active{background:var(--brown-mid);color:#fff;border-color:var(--brown-mid);}
  .bar-group{margin-bottom:10px;}
  .bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .bar-label-name{font-size:12px;font-weight:600;color:var(--text);}
  .bar-label-count{font-size:11px;font-weight:700;color:var(--muted);min-width:28px;text-align:right;}
  .bar-track{background:var(--bg2);border-radius:99px;height:12px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
  .list-area{padding:0 32px 48px;}
  .empty-state{text-align:center;padding:64px 20px;color:#C4946A;}
  .empty-icon{font-size:52px;margin-bottom:14px;}
  .empty-text{font-size:15px;}
  .item-row{background:var(--cream);border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(100,40,0,.06);transition:box-shadow .18s,transform .12s;animation:fadeIn .2s ease;}
  .item-row:hover{box-shadow:0 4px 16px rgba(100,40,0,.13);transform:translateY(-1px);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .badge-roast{border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.05em;white-space:nowrap;}
  .badge-light{background:#F2C49B;color:#7A3B1E;border:1.5px solid #F2C49B;}
  .badge-mid{background:#D4956A;color:#5C3010;border:1.5px solid #D4956A;}
  .badge-dark{background:#8B5E3C;color:#fff;border:1.5px solid #8B5E3C;}
  .item-name{flex:1;font-size:13.5px;font-weight:600;color:var(--brown-dark);}
  .badge-size,.badge-loc{font-size:12px;font-weight:600;border-radius:7px;padding:3px 10px;white-space:nowrap;}
  .badge-size{background:#FFF0E5;color:var(--brown-light);border:1px solid #F2C49B;}
  .badge-loc{background:#F0E4D4;color:#5C3010;border:1px solid var(--border);}
  .icon-btn{background:transparent;border:none;cursor:pointer;font-size:16px;padding:5px 7px;border-radius:7px;transition:background .15s;line-height:1;}
  .icon-btn:hover{background:rgba(200,100,30,.1);}
  .overlay{display:none;position:fixed;inset:0;background:rgba(20,10,5,.55);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
  .overlay.open{display:flex;}
  .modal{background:var(--cream);border-radius:16px;padding:30px 28px;max-width:440px;width:90%;box-shadow:0 8px 48px rgba(100,40,0,.2);border:1.5px solid #E8D5C0;animation:modalIn .2s ease;max-height:90vh;overflow-y:auto;}
  @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-title{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:700;color:var(--brown-dark);margin-bottom:6px;}
  .modal-divider{height:2px;background:linear-gradient(90deg,#E8956D,#C0732A);border-radius:2px;margin-bottom:20px;}
  label{display:block;font-size:11px;font-weight:700;color:#8B5E3C;letter-spacing:.1em;margin-bottom:5px;margin-top:14px;}
  label:first-of-type{margin-top:0;}
  .modal select,.modal input{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
  .modal select:focus,.modal input:focus{border-color:var(--accent);}
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .btn-cancel{flex:1;padding:11px 0;border-radius:9px;border:1.5px solid var(--border);background:var(--cream);color:var(--muted);font-weight:600;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:background .15s;}
  .btn-cancel:hover{background:var(--bg2);}
  .btn-save{flex:2;padding:11px 0;border-radius:9px;border:none;background:linear-gradient(135deg,#E8956D,#C0732A);color:#fff;font-weight:700;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;box-shadow:0 2px 10px rgba(180,80,0,.25);transition:opacity .15s;}
  .btn-save:hover{opacity:.9;}
  .btn-delete-confirm{flex:1;padding:11px 0;border-radius:9px;border:none;background:linear-gradient(135deg,#C0732A,#8B3A10);color:#fff;font-weight:700;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;}
  .delete-center{text-align:center;}
  .delete-icon{font-size:40px;margin-bottom:12px;}
  .delete-title{font-size:16px;font-weight:700;color:var(--brown-dark);margin-bottom:8px;}
  .delete-sub{font-size:13px;color:var(--muted);margin-bottom:22px;}
  .bean-input-wrap{position:relative;}
  .custom-toggle{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:11px;color:var(--accent);cursor:pointer;font-weight:700;letter-spacing:.05em;background:none;border:none;font-family:'Noto Sans JP',sans-serif;padding:0;}
  .custom-toggle:hover{color:var(--brown-light);}
  .custom-input-row{display:none;margin-top:6px;}
  .custom-input-row.show{display:block;}
  .modal input[type="text"]{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--accent);font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);outline:none;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#3B1A08;color:#FFE0BA;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:200;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<div id="loading-overlay">
  <span class="spin">☕</span>
  <p>Firebase に接続中...</p>
</div>

<header>
  <div class="header-left">
    <span class="header-logo">☕</span>
    <div>
      <div class="header-title">コーヒー豆 在庫管理</div>
      <div class="header-sub">COFFEE BEAN INVENTORY</div>
    </div>
  </div>
  <button class="btn-add" onclick="openAdd()">＋ 在庫を追加</button>
</header>

<div class="stats">
  <div class="stat-card stat-all"><div class="stat-count" id="count-all">0</div><div class="stat-label">全て</div></div>
  <div class="stat-card stat-light"><div class="stat-count" id="count-light">0</div><div class="stat-label">浅煎り</div></div>
  <div class="stat-card stat-mid"><div class="stat-count" id="count-mid">0</div><div class="stat-label">中煎り</div></div>
  <div class="stat-card stat-dark"><div class="stat-count" id="count-dark">0</div><div class="stat-label">深煎り</div></div>
</div>

<div class="filters">
  <input class="search-input" type="text" id="search" placeholder="🔍 豆の名前で検索..." oninput="render()">
  <select id="filter-roast" onchange="render()">
    <option value="">全て（焙煎度）</option>
    <option>浅煎り</option><option>中煎り</option><option>深煎り</option>
  </select>
  <select id="filter-loc" onchange="render()">
    <option value="">全て（場所）</option>
    <option>1F手前</option><option>1F手前〈黒〉</option><option>1F奥</option><option>2F</option>
  </select>
</div>

<div class="chart-section">
  <div class="chart-header" onclick="toggleChart()">
    <div class="chart-header-left"><span>📊</span><span class="chart-title">在庫グラフ</span></div>
    <span class="chart-toggle" id="chart-toggle">▲</span>
  </div>
  <div class="chart-body" id="chart-body">
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="setChartTab('location',this)">場所別</button>
      <button class="chart-tab" onclick="setChartTab('roast',this)">焙煎度別</button>
      <button class="chart-tab" onclick="setChartTab('size',this)">サイズ別</button>
      <button class="chart-tab" onclick="setChartTab('bean',this)">豆別（多い順）</button>
    </div>
    <div id="chart-bars"></div>
  </div>
</div>

<div class="list-area" id="list-area"></div>

<div class="overlay" id="modal-form" onclick="closeForm(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">在庫を追加</div>
    <div class="modal-divider"></div>
    <label>焙煎度</label>
    <select id="f-roast" onchange="updateBeanList()">
      <option>浅煎り</option><option>中煎り</option><option>深煎り</option>
    </select>
    <label>豆の名前</label>
    <div class="bean-input-wrap">
      <select id="f-bean"></select>
      <button class="custom-toggle" type="button" onclick="toggleCustomBean()">✏️ リストにない豆を入力する</button>
      <div class="custom-input-row" id="custom-input-row">
        <input type="text" id="f-bean-custom" placeholder="豆の名前を入力...">
      </div>
    </div>
    <label>袋のサイズ</label>
    <select id="f-size"><option>大</option><option>中</option><option>小</option></select>
    <label>場所</label>
    <select id="f-loc"><option>1F手前</option><option>1F手前〈黒〉</option><option>1F奥</option><option>2F</option></select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-form')">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">追加する</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-delete" onclick="closeForm(event)">
  <div class="modal">
    <div class="delete-center">
      <div class="delete-icon">🗑️</div>
      <div class="delete-title">この在庫を削除しますか？</div>
      <div class="delete-sub">削除すると元に戻せません。</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-delete')">キャンセル</button>
        <button class="btn-delete-confirm" onclick="confirmDelete()">削除する</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_nm5RJLcvDP--Z8TiMTiBQlnDTPw2crQ",
  authDomain: "zaiko-kanri-ab78e.firebaseapp.com",
  projectId: "zaiko-kanri-ab78e",
  storageBucket: "zaiko-kanri-ab78e.firebasestorage.app",
  messagingSenderId: "549262560910",
  appId: "1:549262560910:web:efe1776d834cfc535c03df"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const COL = collection(db, "coffee_inventory");

const BEANS = {
  '浅煎り': ['WUSH WUSH カッファG1 ウォッシュド','エチオピア アナソラ アナエロビック','モカ・ヘレフG１「ナチュラル精製」','コロンビア ゲイシャ サーマルショック','コロンビア アプリコットパンチ','COLOMBIA Uba NITRO-WASH','エルディビソ サーマルショック','ラス・アギラス SIDRA WASHED','コロンビア ジューシーグレープ','アカシアヒルズ パカマラ','シナモン ラ・ピラグア コロンビア','コロンビア ゲイシャ ピーチ','日本初登場 ワイニーフラワー','ペルラ・デ・オトゥン SUDAN RUMME','コロンビア スイートベリー','ブラジル ゲイシャ カーボニックマセレーション','Brazil コヘゴ・ダ・リベルダージ COE2023 第5位','オーロヴェルデ ナチュラル COE2022 第3位','ルワンダ ニャマシェケ レッドブルボン','パナマ グラン・デル・バル','ウガンダ ニャビロンゴ アナエロビック','雲南 レモン＆ベルガモット アナエロビックハニー','グアテマラ COE2024 ロス・コネホス #5','ゲイシャ ナチュラル エドウィンファンカ ボリビア','グアテマラ ウエウエテナンゴ','寿ブレンド＿華','寿ブレンド＿姫','モカ・ヘレフG１「ウォッシュド精製」'],
  '中煎り': ['ブラジル セーハ・ド・ボネ','ブラジル カルモエステート','ハワイ コナ','ブルーマウンテン','稀少天然 コピルアク ジャコウネコ','デイリーブレンド','フォレストマウンテン'],
  '深煎り': ['ブラジル ロブスタ コニロン','タイ OMKOI オムコイ オーガニック','日本初輸入 ラヒャン インドネシア','ペルー マチュピチュ','タンザニア ンゴロンゴロ','インド ファインロブスタ パパクチ','インドネシア マンデリン','グアテマラ アンティグア','ケニア ニエリ ファクトリー ウォッシュド','寿ブレンド＿殿','アイスブレンド','水出しコーヒー「コールドブリュー」２ℓ対応','フルッタメルカドン デカフェ','ドン・ラファ デカフェ','モカ・ヘレフG１「ウォッシュド精製」'],
};

const ROAST_CLASS = {'浅煎り':'light','中煎り':'mid','深煎り':'dark'};
const BAG_ICON    = {'大':'◉','中':'◎','小':'○'};
const LOC_ICON    = {'1F手前':'①','1F手前〈黒〉':'①','1F奥':'②','2F':'③'};

let items = [], editId = null, deleteId = null, useCustomBean = false;
let chartTab = 'location', chartOpen = true;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function render() {
  const search = document.getElementById('search').value;
  const fr = document.getElementById('filter-roast').value;
  const fl = document.getElementById('filter-loc').value;
  const filtered = items.filter(i =>
    (!fr || i.roast === fr) && (!fl || i.location === fl) && i.bean.includes(search));

  document.getElementById('count-all').textContent   = items.length;
  document.getElementById('count-light').textContent = items.filter(i=>i.roast==='浅煎り').length;
  document.getElementById('count-mid').textContent   = items.filter(i=>i.roast==='中煎り').length;
  document.getElementById('count-dark').textContent  = items.filter(i=>i.roast==='深煎り').length;

  const area = document.getElementById('list-area');
  if (!filtered.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">🫘</div><div class="empty-text">${items.length===0?'在庫がまだ登録されていません':'条件に一致する在庫がありません'}</div></div>`;
    renderChart(); return;
  }
  area.innerHTML = filtered.map(item => {
    const rc = ROAST_CLASS[item.roast]||'mid';
    const bc = rc==='light'?'#F2C49B':rc==='mid'?'#D4956A':'#8B5E3C';
    return `<div class="item-row" style="border:1.5px solid ${bc}">
      <span class="badge-roast badge-${rc}">${item.roast}</span>
      <span class="item-name">${item.bean}</span>
      <span class="badge-size">${BAG_ICON[item.bagSize]||''} ${item.bagSize}</span>
      <span class="badge-loc">${LOC_ICON[item.location]||''} ${item.location}</span>
      <button class="icon-btn" onclick="openEdit('${item.id}')">✏️</button>
      <button class="icon-btn" onclick="openDelete('${item.id}')">🗑️</button>
    </div>`;
  }).join('');
  renderChart();
}

const CHART_CFGS = {
  location:{keys:['1F手前','1F手前〈黒〉','1F奥','2F'],getKey:i=>i.location,colors:['#E8956D','#D4956A','#C0732A','#6B3416']},
  roast:{keys:['浅煎り','中煎り','深煎り'],getKey:i=>i.roast,colors:['#F2C49B','#D4956A','#8B5E3C']},
  size:{keys:['大','中','小'],getKey:i=>i.bagSize,colors:['#E8956D','#C0732A','#6B3416']},
};

function renderChart() {
  const el = document.getElementById('chart-bars');
  if (chartTab === 'bean') {
    const counts = {};
    items.forEach(i => { counts[i.bean]=(counts[i.bean]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    if (!sorted.length) { el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px 0;">在庫がまだありません</div>'; return; }
    const max=sorted[0][1];
    const C=['#E8956D','#C0732A','#6B3416','#A0522D','#8B4513','#CD853F','#D2691E'];
    el.innerHTML = sorted.map(([bean,cnt],i)=>{
      const pct=Math.round(cnt/max*100);
      const rank=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
      return `<div class="bar-group">
        <div class="bar-label">
          <span class="bar-label-name" style="display:flex;align-items:center;gap:5px;">
            <span style="min-width:22px;font-size:12px;">${rank}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;max-width:240px;white-space:nowrap;">${bean}</span>
          </span>
          <span class="bar-label-count">${cnt}袋</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${C[i%C.length]};"></div></div>
      </div>`;
    }).join('');
    return;
  }
  const cfg=CHART_CFGS[chartTab];
  const counts={};cfg.keys.forEach(k=>counts[k]=0);
  items.forEach(i=>{const k=cfg.getKey(i);if(k in counts)counts[k]++;});
  const max=Math.max(...Object.values(counts),1);
  el.innerHTML=cfg.keys.map((key,i)=>{
    const cnt=counts[key],pct=Math.round(cnt/max*100);
    return `<div class="bar-group">
      <div class="bar-label"><span class="bar-label-name">${key}</span><span class="bar-label-count">${cnt}件</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cfg.colors[i]};"></div></div>
    </div>`;
  }).join('');
}

window.setChartTab=(tab,el)=>{chartTab=tab;document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderChart();};
window.toggleChart=()=>{chartOpen=!chartOpen;document.getElementById('chart-body').style.display=chartOpen?'':'none';document.getElementById('chart-toggle').textContent=chartOpen?'▲':'▼';};

window.updateBeanList=(selectedBean)=>{
  const roast=document.getElementById('f-roast').value;
  document.getElementById('f-bean').innerHTML=(BEANS[roast]||[]).map(b=>`<option${b===selectedBean?' selected':''}>${b}</option>`).join('');
};
window.toggleCustomBean=()=>{
  useCustomBean=!useCustomBean;
  document.getElementById('custom-input-row').classList.toggle('show',useCustomBean);
  document.getElementById('f-bean').style.display=useCustomBean?'none':'';
  document.querySelector('.custom-toggle').textContent=useCustomBean?'📋 リストから選ぶ':'✏️ リストにない豆を入力する';
  if(useCustomBean)document.getElementById('f-bean-custom').focus();
};
function getBeanValue(){return useCustomBean?document.getElementById('f-bean-custom').value.trim():document.getElementById('f-bean').value;}

window.openAdd=()=>{
  editId=null;useCustomBean=false;
  document.getElementById('modal-title').textContent='在庫を追加';
  document.querySelector('#modal-form .btn-save').textContent='追加する';
  document.getElementById('f-roast').value='浅煎り';
  document.getElementById('f-bean').style.display='';
  document.getElementById('custom-input-row').classList.remove('show');
  document.getElementById('f-bean-custom').value='';
  document.querySelector('.custom-toggle').textContent='✏️ リストにない豆を入力する';
  window.updateBeanList();
  document.getElementById('f-size').value='中';
  document.getElementById('f-loc').value='1F手前';
  document.getElementById('modal-form').classList.add('open');
};
window.openEdit=(id)=>{
  const item=items.find(i=>i.id===id);if(!item)return;
  editId=id;
  document.getElementById('modal-title').textContent='在庫を編集';
  document.querySelector('#modal-form .btn-save').textContent='更新する';
  document.getElementById('f-roast').value=item.roast;
  const inList=(BEANS[item.roast]||[]).includes(item.bean);
  useCustomBean=!inList;
  document.getElementById('f-bean').style.display=inList?'':'none';
  document.getElementById('custom-input-row').classList.toggle('show',!inList);
  document.querySelector('.custom-toggle').textContent=inList?'✏️ リストにない豆を入力する':'📋 リストから選ぶ';
  window.updateBeanList(item.bean);
  document.getElementById('f-bean-custom').value=inList?'':item.bean;
  document.getElementById('f-size').value=item.bagSize;
  document.getElementById('f-loc').value=item.location;
  document.getElementById('modal-form').classList.add('open');
};
window.saveItem=async()=>{
  const roast=document.getElementById('f-roast').value;
  const bean=getBeanValue();
  const bagSize=document.getElementById('f-size').value;
  const location=document.getElementById('f-loc').value;
  if(!bean){alert('豆の名前を入力してください');return;}
  const btn=document.querySelector('#modal-form .btn-save');
  btn.textContent='保存中...';btn.disabled=true;
  try{
    if(editId){await updateDoc(doc(db,'coffee_inventory',editId),{roast,bean,bagSize,location});showToast('✅ 更新しました');}
    else{await addDoc(COL,{roast,bean,bagSize,location,createdAt:serverTimestamp()});showToast('✅ 追加しました');}
    closeModal('modal-form');
  }catch(e){alert('保存に失敗しました: '+e.message);}
  btn.textContent=editId?'更新する':'追加する';btn.disabled=false;
};
window.openDelete=(id)=>{deleteId=id;document.getElementById('modal-delete').classList.add('open');};
window.confirmDelete=async()=>{
  try{await deleteDoc(doc(db,'coffee_inventory',deleteId));showToast('🗑️ 削除しました');closeModal('modal-delete');}
  catch(e){alert('削除に失敗しました: '+e.message);}
};
window.closeModal=(id)=>document.getElementById(id).classList.remove('open');
window.closeForm=(e)=>{if(e.target.classList.contains('overlay'))e.target.classList.remove('open');};

onSnapshot(COL,(snapshot)=>{
  items=snapshot.docs.map(d=>({id:d.id,...d.data()}));
  items.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  document.getElementById('loading-overlay').style.display='none';
  window.updateBeanList();
  render();
},(err)=>{
  document.getElementById('loading-overlay').innerHTML=`<span style="font-size:40px;">⚠️</span><p style="color:#C0732A;">接続エラー: ${err.message}</p>`;
});
</script>
</body>
</html>
